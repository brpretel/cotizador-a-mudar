<div>
  <h2 class="cf-title">Antes de empezar</h2>
  <p class="cf-subtitle">
    Déjanos tus datos para enviarte la cotización y poder ayudarte si no alcanzas a terminar el formulario.
  </p>

  <input id="contact-name" class="cf-input" type="text" placeholder="Nombre y apellido" />
  <input id="contact-email" class="cf-input" type="email" placeholder="Correo electrónico" />
  <input id="contact-phone" class="cf-input" type="tel" placeholder="Teléfono / WhatsApp" />

  <button class="cf-btn" id="contact-continue">Continuar</button>
</div>

<div>
  <button class="cf-textbtn" data-back="step3-direcciones">← Volver</button>

  <h2 class="cf-title">Tipo de mudanza</h2>
  <p class="cf-subtitle">Elige la modalidad del servicio para calcular la tarifa por kilómetro.</p>

  <div id="mudanza-fecha-info" class="cf-soft-card"></div>
  <div id="mudanza-tarifa-note" class="cf-soft-card"></div>

  <div class="cf-choice-grid">
    <button class="cf-choice-card is-primary" data-mudanza="completa" type="button">
      <span class="cf-choice-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 11h11v7H3z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M14 13h3l3 3v2h-6z" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="7" cy="19" r="1.8" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="17" cy="19" r="1.8" stroke="currentColor" stroke-width="1.8"/>
          <path d="M3 8h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M5 5h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="cf-choice-title">Mudanza Completa</span>
      <span class="cf-choice-copy">
        Servicio exclusivo para tu mudanza.<br>
        <b>Tiempo estimado:</b> de un día para otro.
      </span>
    </button>

    <button class="cf-choice-card is-success" data-mudanza="compartida" type="button">
      <span class="cf-choice-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 11h9v7H3z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 13h3l2 2v3h-5z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M14 10h7v6h-4" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="7" cy="19" r="1.8" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="15" cy="19" r="1.8" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="19" cy="19" r="1.8" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </span>
      <span class="cf-choice-title">Mudanza Compartida</span>
      <span class="cf-choice-copy">
        Tu ruta podrá compartir cupo con otros servicios.<br>
        <b>Tiempo estimado:</b> 2 a 5 días.
      </span>
    </button>
  </div>
</div>
